title = "LX Sixty Group gitleaks config"

# This repo intentionally contains two known-public values in its built
# HTML pages:
#
#   1. Firebase web API key in dist/iba2026/index.html and
#      dist/adminiba2026/index.html. Public-by-design per Firebase model;
#      security rests on Firestore Security Rules, not on this key being
#      secret. https://firebase.google.com/docs/projects/api-keys
#
#   2. Cloudflare Web Analytics beacon token (the data-cf-beacon attribute
#      on <script src="static.cloudflareinsights.com/beacon.min.js">).
#      Public-by-design per Cloudflare model; identifies the analytics
#      project, grants no access. The same token appears in every HTML
#      page on the site so visitor analytics work.
#
# Path-based allowlist below excludes scanner findings in those files
# WITHOUT repeating the literal values in this config (which would
# itself trigger every secret-scanning tool on every push).

[extend]
useDefault = true

[allowlist]
description = "Path exclusions for vendored libs and the public-by-design Firebase + Cloudflare Web Analytics tokens embedded in built HTML"
paths = [
  '''node_modules/''',
  '''dist/lib/''',
  '''public/lib/''',
  '''.wrangler/''',
  '''dist/.*\.html''',
]
